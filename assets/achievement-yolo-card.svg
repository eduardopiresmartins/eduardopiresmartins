<svg width="360" height="220" viewBox="0 0 360 220" fill="none" xmlns="http://www.w3.org/2000/svg" role="img" aria-labelledby="title desc">
  <title id="title">YOLO achievement card</title>
  <desc id="desc">GitHub-style achievement card for the YOLO achievement.</desc>
  <defs>
    <linearGradient id="ring" x1="74" y1="50" x2="160" y2="136" gradientUnits="userSpaceOnUse">
      <stop stop-color="#F7B267"/>
      <stop offset="0.34" stop-color="#F58EA8"/>
      <stop offset="0.68" stop-color="#B58DFF"/>
      <stop offset="1" stop-color="#72E1D1"/>
    </linearGradient>
    <linearGradient id="bg" x1="20" y1="18" x2="340" y2="202" gradientUnits="userSpaceOnUse">
      <stop stop-color="#111827"/>
      <stop offset="1" stop-color="#0D1117"/>
    </linearGradient>
  </defs>
  <rect x="6" y="6" width="348" height="208" rx="14" fill="url(#bg)" stroke="#30363D" stroke-width="2"/>
  <circle cx="112" cy="96" r="60" fill="#0D1117"/>
  <circle cx="112" cy="96" r="54" fill="#161B22" stroke="url(#ring)" stroke-width="12"/>
  <text x="112" y="88" text-anchor="middle" fill="#FFFFFF" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="800">YO</text>
  <text x="112" y="112" text-anchor="middle" fill="#FFFFFF" font-family="'Segoe UI', Arial, sans-serif" font-size="26" font-weight="800">LO</text>
  <circle cx="94" cy="78" r="6" fill="#F58EA8"/>
  <circle cx="132" cy="74" r="5" fill="#72E1D1"/>
  <circle cx="136" cy="122" r="4" fill="#B58DFF"/>
  <rect x="267" y="24" width="58" height="26" rx="13" fill="#1F6FEB"/>
  <text x="296" y="41" text-anchor="middle" fill="#FFFFFF" font-family="'Segoe UI', Arial, sans-serif" font-size="14" font-weight="700">New</text>
  <text x="112" y="178" text-anchor="middle" fill="#FFFFFF" font-family="'Segoe UI', Arial, sans-serif" font-size="32" font-weight="700">YOLO</text>
</svg>
